<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacked By BTR</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
            font-family: 'Courier New', Courier, monospace;
        }

        /* خلفية الماتريكس */
        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        .content {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; text-align: center;
            z-index: 1; pointer-events: none;
        }

        .content * { pointer-events: auto; }

        img {
            width: 400px; max-width: 85%; border: 2px solid red;
            box-shadow: 0 0 30px red; margin-bottom: 20px;
            animation: pulse 2s infinite ease-in-out;
            background: black;
        }

        h1 {
            color: red; font-size: clamp(30px, 8vw, 60px);
            margin: 10px 0; text-shadow: 0 0 10px red, 0 0 20px red;
        }

        .hacker-text {
            color: #00ff00; font-size: clamp(18px, 4vw, 25px);
            text-shadow: 0 0 10px #00ff00; font-weight: bold;
        }

        .discord-line {
            color: #00ff00; font-size: clamp(16px, 3.5vw, 22px);
            text-shadow: 0 0 10px #00ff00; margin-top: 10px;
        }

        .discord-line a {
            color: white; text-decoration: none; font-weight: bold;
            text-shadow: 0 0 10px white;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body onclick="playAudio()">

    <audio id="myAudio" loop>
        <source src="https://files.catbox.moe/pjetzx.mp3" type="audio/mpeg">
    </audio>

    <canvas id="matrix-canvas"></canvas>

    <div class="content">
        <img src="https://i.postimg.cc/Vs3jJ1PL/IMG-2267.jpg"> 
        <h1>تم زغب السيرفر</h1>
        <p class="hacker-text">Fucked By BTR</p>
        <p class="discord-line">
            GG : <a href="https://discord.gg/AcbMm2y8u" target="_blank">discord.gg/AcbMm2y8u</a>
        </p>
    </div>

    <script>
        // تشغيل الصوت عند أول ضغطة
        function playAudio() {
            var audio = document.getElementById("myAudio");
            audio.play().catch(function(error) {
                console.log("التحميل فشل أو المتصفح منع التشغيل التلقائي");
            });
        }

        // كود الماتريكس
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄ';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
