<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacked By BTR</title>
    <style>
        /* إعدادات الخلفية والنجوم */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            /* رابط خلفية النجوم */
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            background-repeat: repeat;
        }

        /* حاوية المحتوى وتوسيطه */
        .content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace; /* خط الهاك */
            text-align: center;
            z-index: 1;
        }

        /* تنسيق الصورة مع التوهج الأحمر */
        img {
            width: 450px;
            max-width: 90%;
            border: 2px solid red;
            box-shadow: 0 0 30px red, 0 0 10px white;
            margin-bottom: 25px;
            border-radius: 5px;
        }

        /* تنسيق النص العربي (توهج أحمر) */
        h1 {
            color: red;
            font-size: clamp(30px, 8vw, 60px); /* حجم خط مرن للجوال والكمبيوتر */
            margin: 10px 0;
            text-shadow: 0 0 10px red, 0 0 20px red, 0 0 30px red;
            font-weight: bold;
        }

        /* تنسيق النص الإنجليزي (توهج أخضر فسفوري) */
        p {
            color: #00ff00;
            font-size: clamp(18px, 4vw, 25px);
            margin-top: 5px;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* حركة بسيطة "تذبذب" للصورة لتعطي طابع تقني */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        img {
            animation: pulse 2s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <div class="content">
        <img src="https://i.postimg.cc/Vs3jJ1PL/IMG-2267.jpg" alt="Hacked"> 
        
        <h1>تم زغب السيرفر</h1>
        <p>GG : Fucked By BTR</p>
    </div>

</body>
</html>
